org.gradle.jvmargs=-Xmx4096M
android.useAndroidX=true
android.enableJetifier=true
# Disable Kotlin incremental compilation to avoid cache issues
kotlin.incremental=false
kotlin.incremental.android=false

# Local developers should put org.gradle.java.home inside android/local.properties instead of here!
# org.gradle.java.home=C:\\Program Files\\Android\\Android Studio\\jbr

# Enable uncompressed native libs for 16KB page size support
android.bundle.enableUncompressedNativeLibs=true
kotlin_version=2.1.0
