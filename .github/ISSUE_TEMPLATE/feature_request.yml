name: Feature Request
description: Suggest a new feature or improvement
title: "[FEATURE] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Do you have an idea to improve NeoStation? Tell us about it.
  - type: textarea
    id: problem
    attributes:
      label: What problem does it solve?
      description: Describe the need or current problem.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the functionality you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you thought about other ways to solve it?
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information, mockups, or examples.
