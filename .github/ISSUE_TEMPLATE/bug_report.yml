name: Bug Report
description: Report an error or unexpected behavior
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the information below.
  - type: input
    id: version
    attributes:
      label: NeoStation Version
      description: What version are you using? (Check in Settings > About)
      placeholder: "e.g. 0.8.0+86"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which operating system does this occur on?
      options:
        - Windows
        - Linux
        - macOS
        - Android
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clearly describe what is happening.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: List the steps to reproduce the error.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See the error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: If you have logs or screenshots, paste them here.
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues and did not find a similar one.
          required: true
